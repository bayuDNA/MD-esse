<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rekap Foto App - Dark Edition</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --primary-color: #38bdf8;
      --primary-hover: #0ea5e9;
      --success-color: #4ade80;
      --warning-color: #fbbf24;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      padding: 20px 15px; 
      background-color: var(--bg-color); 
      color: var(--text-main);
    }

    .container { 
      max-width: 450px; 
      margin: 0 auto; 
      background: var(--card-bg); 
      padding: 24px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); 
      box-sizing: border-box;
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
    }

    h2 { 
      margin-top: 0; 
      font-size: 22px; 
      font-weight: 700;
      margin-bottom: 20px; 
      text-align: center;
    }
    h2 span { color: var(--primary-color); }

    .dashboard { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 24px; 
      background: rgba(15, 23, 42, 0.6); 
      padding: 16px 8px; 
      border-radius: 12px; 
      border: 1px solid var(--border-color);
    }
    .dash-item { 
      flex: 1; 
      text-align: center; 
      font-size: 11px; 
      font-weight: 600; 
      color: var(--text-muted); 
      border-right: 1px solid var(--border-color); 
    }
    .dash-item:last-child { border-right: none; }
    .dash-num { 
      font-size: 22px; 
      font-weight: 700;
      color: var(--primary-color); 
      display: block; 
      margin-top: 6px; 
    }
    .dash-item:nth-child(2) .dash-num { color: #f87171; }
    .dash-item:nth-child(3) .dash-num { color: var(--warning-color); }

    .preview-container {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 12px;
      display: none;
      border: 1px solid var(--border-color);
    }
    img { 
      width: 100%; 
      max-width: 100%; 
      display: block; 
      background: #0f172a; 
      max-height: 280px; 
      object-fit: contain; 
    }

    /* Input Fields Style */
    .input-group {
      margin-top: 16px;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    textarea.input-field {
      resize: vertical;
      min-height: 80px;
    }

    .btn { 
      background-color: var(--primary-color); 
      color: #0f172a; 
      border: none; 
      padding: 15px; 
      font-size: 15px; 
      font-weight: 700; 
      border-radius: 12px; 
      cursor: pointer;
