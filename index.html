<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rekap Foto App - Dark Edition</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --primary-color: #38bdf8;
      --primary-hover: #0ea5e9;
      --success-color: #4ade80;
      --warning-color: #fbbf24;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
    }

    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      padding: 20px 15px; 
      background-color: var(--bg-color); 
      color: var(--text-main);
    }

    .container { 
      max-width: 450px; 
      margin: 0 auto; 
      background: var(--card-bg); 
      padding: 24px; 
      border-radius: 16px; 
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); 
      box-sizing: border-box;
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
    }

    h2 { 
      margin-top: 0; 
      font-size: 22px; 
      font-weight: 700;
      margin-bottom: 20px; 
      text-align: center;
    }
    h2 span { color: var(--primary-color); }

    .dashboard { 
      display: flex; 
      justify-content: space-between; 
      margin-bottom: 24px; 
      background: rgba(15, 23, 42, 0.6); 
      padding: 16px 8px; 
      border-radius: 12px; 
      border: 1px solid var(--border-color);
    }
    .dash-item { 
      flex: 1; 
      text-align: center; 
      font-size: 11px; 
      font-weight: 600; 
      color: var(--text-muted); 
      border-right: 1px solid var(--border-color); 
    }
    .dash-item:last-child { border-right: none; }
    .dash-num { 
      font-size: 22px; 
      font-weight: 700;
      color: var(--primary-color); 
      display: block; 
      margin-top: 6px; 
    }
    .dash-item:nth-child(2) .dash-num { color: #f87171; }
    .dash-item:nth-child(3) .dash-num { color: var(--warning-color); }

    .preview-container {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 12px;
      display: none;
      border: 1px solid var(--border-color);
    }
    img { 
      width: 100%; 
      max-width: 100%; 
      display: block; 
      background: #0f172a; 
      max-height: 280px; 
      object-fit: contain; 
    }

    /* Input Fields Style */
    .input-group {
      margin-top: 16px;
      text-align: left;
    }
    .input-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-field {
      width: 100%;
      padding: 12px;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s ease;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    textarea.input-field {
      resize: vertical;
      min-height: 80px;
    }

    .btn { 
      background-color: var(--primary-color); 
      color: #0f172a; 
      border: none; 
      padding: 15px; 
      font-size: 15px; 
      font-weight: 700; 
      border-radius: 12px; 
      cursor: pointer; 
      width: 100%; 
      margin: 12px 0; 
      box-sizing: border-box; 
      text-align: center; 
      display: inline-block; 
      text-decoration: none; 
      transition: all 0.25s ease;
    }
    .btn:active { transform: scale(0.98); }
    
    .file-input-label { 
      background-color: rgba(56, 189, 248, 0.1); 
      color: var(--primary-color);
      border: 2px dashed var(--primary-color);
    }
    .file-input-label.has-photo {
      background-color: rgba(74, 222, 128, 0.1);
      color: var(--success-color);
      border: 2px solid var(--success-color);
    }
    .btn-submit { margin-top: 20px; }
    .btn:disabled { 
      background-color: #334155 !important; 
      color: #64748b !important; 
      cursor: not-allowed; 
    }

    .radio-group { 
      text-align: left; 
      margin: 20px 0; 
      padding: 16px; 
      border: 1px solid var(--border-color); 
      border-radius: 12px; 
      background: rgba(15, 23, 42, 0.4); 
    }
    .radio-group strong { 
      display: block; 
      margin-bottom: 12px; 
      color: var(--text-muted); 
      font-size: 13px;
      text-transform: uppercase;
    }
    .radio-group label { 
      display: flex;
      align-items: center;
      padding: 12px 8px; 
      cursor: pointer; 
      font-size: 15px; 
      border-radius: 8px;
    }
    .radio-group input { 
      margin-right: 12px; 
      accent-color: var(--primary-color);
      transform: scale(1.2); 
    }

    #loading { 
      display: none; 
      color: var(--primary-color); 
      font-weight: 600; 
      margin-top: 15px; 
      font-size: 14px;
    }
    #file-camera { display: none; }
    .bump { animation: bumpAnim 0.3s ease-in-out; }
    @keyframes bumpAnim {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Rekap Lapangan <span>Pro</span></h2>
  
  <div class="dashboard">
    <div class="dash-item">Terpasang<span class="dash-num" id="dash-terpasang">0</span></div>
    <div class="dash-item">Tdk Terpasang<span class="dash-num" id="dash-tidak">0</span></div>
    <div class="dash-item">Tutup Perm.<span class="dash-num" id="dash-tutup">0</span></div>
  </div>

  <label for="file-camera" class="btn file-input-label" id="label-kamera">📸 Ambil Foto Langsung</label>
  <input type="file" id="file-camera" accept="image/*" capture="environment" onchange="prosesFoto(this)">
  
  <canvas id="canvas" style="display:none;"></canvas>
  <div class="preview-container" id="preview-box">
    <img id="preview" alt="Preview Foto">
  </div>

  <div class="input-group">
    <label for="nama-toko">Nama Toko</label>
    <input type="text" id="nama-toko" class="input-field" placeholder="Masukkan nama toko...">
  </div>

  <div class="input-group">
    <label for="keterangan">Keterangan</label>
    <textarea id="keterangan" class="input-field" placeholder="Tambahkan catatan atau keterangan lapangan..."></textarea>
  </div>

  <div class="radio-group">
    <strong>Pilih Status Terkini</strong>
    <label><input type="radio" name="status" value="Terpasang" checked> Terpasang</label>
    <label><input type="radio" name="status" value="Tidak Terpasang"> Tidak Terpasang</label>
    <label><input type="radio" name="status" value="Tutup Permanen"> Tutup Permanen</label>
  </div>

  <button class="btn btn-submit" id="btn-send" onclick="simpanData()">SIMPAN DATA</button>
  <div id="loading">Menyinkronkan data dengan server...</div>
</div>

<script>
  // ALAMAT WEB APP GOOGLE APPS SCRIPT ANDA
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxX5fAOmIw-MbxwEl0iKtStLU-8zSzsYcjpm_LvRG7tJb30UyO4VM9klBSo3SoZ9tFs/exec";

  let preview = document.getElementById('preview');
  let previewBox = document.getElementById('preview-box');
  let canvas = document.getElementById('canvas');
  let labelKamera = document.getElementById('label-kamera');
  let base64Image = "";

  // Ambil data dashboard saat halaman di-load di GitHub
  window.onload = function() {
    fetch(WEB_APP_URL + "?action=getDashboard")
      .then(response => response.json())
      .then(data => updateDashboard(data))
      .catch(err => console.log("Gagal memuat data dashboard awal:", err));
  };

  function prosesFoto(input) {
    if (input.files && input.files[0]) {
      let reader = new FileReader();
      reader.onload = function(e) {
        let img = new Image();
        img.onload = function() {
          let ctx = canvas.getContext('2d');
          let max_width = 1000;
          let max_height = 1000;
          let width = img.width;
          let height = img.height;
          
          if (width > height) {
            if (width > max_width) { height *= max_width / width; width = max_width; }
          } else {
            if (height > max_height) { width *= max_height / height; height = max_height; }
          }
          
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          
          base64Image = canvas.toDataURL('image/jpeg', 0.7);
          preview.src = base64Image;
          previewBox.style.display = "block";
          labelKamera.innerText = "🔄 Ganti Foto";
          labelKamera.classList.add('has-photo');
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  function simpanData() {
    if (!base64Image) {
      alert("Harap ambil foto terlebih dahulu sebelum menyimpan!");
      return;
    }

    let namaToko = document.getElementById('nama-toko').value.trim();
    let keterangan = document.getElementById('keterangan').value.trim();

    if (!namaToko) {
      alert("Harap isi Nama Toko terlebih dahulu!");
      return;
    }
    
    let status = document.querySelector('input[name="status"]:checked').value;
    document.getElementById('loading').style.display = "block";
    document.getElementById('btn-send').disabled = true;

    // Mengirim data menggunakan POST Method ke Google Apps Script (CORS Friendly via GitHub)
    fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors", // Mode aman lintas domain untuk Apps Script Web App
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body: new URLSearchParams({
        "image": base64Image,
        "status": status,
        "namaToko": namaToko,
        "keterangan": keterangan
      })
    })
    .then(() => {
      // Karena menggunakan "no-cors", respons tidak bisa dibaca langsung secara detail, 
      // Maka kita langsung anggap sukses dan lakukan update dashboard cadangan secara manual.
      document.getElementById('loading').style.display = "none";
      document.getElementById('btn-send').disabled = false;
      
      alert("Data berhasil dikirim!");
      
      // Reset Form
      previewBox.style.display = "none";
      base64Image = "";
      document.getElementById('file-camera').value = "";
      document.getElementById('nama-toko').value = "";
      document.getElementById('keterangan').value = "";
      labelKamera.innerText = "📸 Ambil Foto Langsung";
      labelKamera.classList.remove('has-photo');

      // Refresh dashboard ulang setelah input data baru
      setTimeout(() => {
        fetch(WEB_APP_URL + "?action=getDashboard")
          .then(res => res.json())
          .then(data => animateDashboardChange(data));
      }, 2000);
    })
    .catch(error => {
      alert("Terjadi masalah jaringan saat menyimpan data.");
      document.getElementById('loading').style.display = "none";
      document.getElementById('btn-send').disabled = false;
    });
  }

  function updateDashboard(rekap) {
    if(!rekap) return;
    document.getElementById('dash-terpasang').innerText = rekap.terpasang || 0;
    document.getElementById('dash-tidak').innerText = rekap.tidakTerpasang || 0;
    document.getElementById('dash-tutup').innerText = rekap.tutupPermanen || 0;
  }

  function animateDashboardChange(newRekap) {
    if(!newRekap) return;
    let targets = [
      { id: 'dash-terpasang', val: newRekap.terpasang || 0 },
      { id: 'dash-tidak', val: newRekap.tidakTerpasang || 0 },
      { id: 'dash-tutup', val: newRekap.tutupPermanen || 0 }
    ];
    targets.forEach(item => {
      let el = document.getElementById(item.id);
      if(el.innerText !== String(item.val)) {
        el.innerText = item.val;
        el.classList.add('bump');
        setTimeout(() => el.classList.remove('bump'), 300);
      }
    });
  }
</script>
</body>
</html>
