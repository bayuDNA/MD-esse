<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Google Apps Script Saya</title>
    <style>
        /* Menghilangkan semua ruang kosong bawaan browser */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah double scrollbar */
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Mengatur kontainer utama agar memenuhi layar */
        .app-container {
            position: absolute;
            top: 0;
            left: 0;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Mengatur iframe Apps Script agar responsif dan berfungsi penuh */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxX5fAOmIw-MbxwEl0iKtStLU-8zSzsYcjpm_LvRG7tJb30UyO4VM9klBSo3SoZ9tFs/exec" 
            allow="geolocation; microphone; camera; midi; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
            Memuat Aplikasi...
        </iframe>
    </div>

</body>
</html>
