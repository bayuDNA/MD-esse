<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aplikasi Utama</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        .full-screen-container {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="full-screen-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbxX5fAOmIw-MbxwEl0iKtStLU-8zSzsYcjpm_LvRG7tJb30UyO4VM9klBSo3SoZ9tFs/exec" 
            allow="geolocation; microphone; camera; encrypted-media;" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
